# ============================================================
# docker-compose.yml — LuxeCart Full Stack
#
# Start:  docker compose up --build
# Stop:   docker compose down -v
# Logs:   docker compose logs -f api
# ============================================================
version: "3.9"

services:

  # ── MS SQL Server 2022 ──────────────────────────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecommerce_db
    environment:
      SA_PASSWORD: "${DB_PASSWORD:-StrongPass!2024}"
      ACCEPT_EULA: "Y"
      MSSQL_PID:   "Express"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd",
             "-S", "localhost", "-U", "sa",
             "-P", "${DB_PASSWORD:-StrongPass!2024}",
             "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout:   5s
      retries:   15

  # ── DB seed — runs ECommerceDB.sql once SQL Server is healthy ───────────────
  db-seed:
    image: mcr.microsoft.com/mssql-tools
    container_name: ecommerce_seed
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./database:/scripts
    command: >
      /bin/bash -c "
        /opt/mssql-tools18/bin/sqlcmd
          -S db -U sa
          -P '${DB_PASSWORD:-StrongPass!2024}'
          -C -i /scripts/ECommerceDB.sql &&
        echo 'Database seeded successfully.'
      "
    restart: "no"

  # ── .NET 8 Web API ──────────────────────────────────────────────────────────
  api:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: ecommerce_api
    environment:
      ASPNETCORE_ENVIRONMENT: "Docker"
      ASPNETCORE_URLS:        "http://+:5000"
      ConnectionStrings__DefaultConnection: >-
        Server=db;Database=ECommerceDB;User Id=sa;
        Password=${DB_PASSWORD:-StrongPass!2024};
        TrustServerCertificate=True;
      Jwt__Secret:   "${JWT_SECRET:-ChangeThisToA32CharSecretInProd!}"
      Jwt__Issuer:   "ECommerceAPI"
      Jwt__Audience: "ECommerceClient"
    ports:
      - "5000:5000"
    depends_on:
      db-seed:
        condition: service_completed_successfully
    # Docker uses the /health/live endpoint to decide if the container is ready.
    # This is the liveness probe — it only checks the API process, not the DB.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health/live"]
      interval: 15s
      timeout:   5s
      retries:   5
      start_period: 20s
    restart: unless-stopped
    volumes:
      - api_logs:/app/logs

  # ── Angular SPA via nginx ───────────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce_frontend
    ports:
      - "4200:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sql_data:
  api_logs:
