server {
    listen       80;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on; gzip_vary on; gzip_min_length 1024;
    gzip_types text/plain text/css application/json
               application/javascript text/xml application/xml image/svg+xml;

    # ── API reverse proxy — "api" = Docker Compose service name ─────────────
    location /api/ {
        proxy_pass         http://api:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Swagger available at /swagger even via the frontend port ─────────────
    location /swagger/ {
        proxy_pass         http://api:5000/swagger/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Static assets — long-lived cache for hashed filenames ────────────────
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|webp)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # ── Angular SPA — all unmatched routes return index.html ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
