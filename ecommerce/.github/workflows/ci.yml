# ============================================================
# GitHub Actions — CI Pipeline
# Triggers on every push and pull request to main/master.
# Runs: backend xUnit tests + Angular Jasmine tests.
# ============================================================
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:

  # ── .NET backend tests ────────────────────────────────────────────────────
  backend-tests:
    name: Backend — xUnit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore NuGet packages
        run: dotnet restore backend/ECommerce.sln

      - name: Build solution
        run: dotnet build backend/ECommerce.sln --no-restore --configuration Release

      - name: Run xUnit tests
        run: |
          dotnet test backend/ECommerceAPI.Tests/ECommerceAPI.Tests.csproj \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()                        # upload even on test failure
        with:
          name: backend-test-results
          path: "**/*.trx"

  # ── Angular frontend tests ────────────────────────────────────────────────
  frontend-tests:
    name: Frontend — Jasmine Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run Jasmine / Karma tests (headless Chrome)
        run: npx ng test --watch=false --browsers=ChromeHeadless --code-coverage
        working-directory: frontend

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/

  # ── Docker build verification ─────────────────────────────────────────────
  docker-build:
    name: Docker — Build Verification
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]   # only if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context:  ./backend
          push:     false                   # just verify it builds
          tags:     ecommerce-api:ci

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context:  ./frontend
          push:     false
          tags:     ecommerce-frontend:ci
